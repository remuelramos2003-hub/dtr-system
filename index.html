<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTR System - Works Immediately</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body{background:#f0f2f5;padding:20px;font-family:'Segoe UI',sans-serif;}
        .container{max-width:1400px;margin:0 auto;background:white;border-radius:20px;padding:20px;}
        .header{text-align:center;padding:20px;border-bottom:1px solid #eee;}
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin:20px 0;}
        .stat-card{background:#f8f9fa;padding:15px;border-radius:10px;text-align:center;}
        .stat-card h3{font-size:28px;margin:0;color:#4361ee;}
        .form-area{background:#f8f9fa;padding:20px;border-radius:10px;margin-bottom:20px;}
        input,select,textarea{width:100%;padding:10px;margin:5px 0 15px;border:1px solid #ddd;border-radius:8px;}
        button{background:#4361ee;color:white;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;}
        .btn-danger{background:#dc3545;}
        .btn-success{background:#2e7d32;}
        .record-card{background:white;border:1px solid #eee;border-radius:10px;padding:15px;margin-bottom:15px;}
        .record-img{max-width:100%;height:150px;object-fit:cover;border-radius:8px;}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:15px;}
        .search-bar{display:flex;gap:10px;margin-bottom:20px;}
        .search-bar input{flex:1;}
        .toast{position:fixed;bottom:20px;right:20px;background:#333;color:white;padding:10px 20px;border-radius:8px;z-index:1000;}
        @media print{.form-area,.search-bar,.buttons{display:none;}}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="bi bi-database"></i> DTR System</h1>
        <p>Works immediately | No connection issues | Export/Import to share</p>
        <span style="background:#2e7d32;color:white;padding:4px 12px;border-radius:20px;font-size:12px;">✓ Ready to use</span>
    </div>

    <div class="stats">
        <div class="stat-card"><i class="bi bi-files"></i><h3 id="totalCount">0</h3><p>Records</p></div>
        <div class="stat-card"><i class="bi bi-people"></i><h3 id="empCount">0</h3><p>Employees</p></div>
        <div class="stat-card"><i class="bi bi-calendar"></i><h3 id="monthCount">0</h3><p>This Month</p></div>
        <div class="stat-card"><i class="bi bi-building"></i><h3 id="clientCount">0</h3><p>Clients</p></div>
    </div>

    <div class="form-area">
        <h4><i class="bi bi-plus-circle"></i> Add DTR Record</h4>
        <input type="text" id="empName" placeholder="Employee Name">
        <select id="client">
            <option value="">Select Client</option>
            <option>AHAM</option><option>ARGO</option><option>BEYOND CONCEPT</option><option>COH</option>
            <option>DC SUPERHEROES</option><option>DIAMOND</option><option>DIGITS</option><option>SHOPEE</option>
            <option>LANDERS</option><option>HAVI</option><option>OTHER</option>
        </select>
        <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:10px;">
            <input type="date" id="fromDate">
            <span>→</span>
            <input type="date" id="toDate">
        </div>
        <textarea id="remarks" rows="2" placeholder="Remarks (optional)"></textarea>
        <input type="file" id="imageFile" accept="image/*">
        <img id="preview" style="max-width:100%;max-height:150px;margin-top:10px;display:none;border-radius:8px;">
        <div style="display:flex;gap:10px;margin-top:15px;">
            <button onclick="saveRecord()" style="flex:1"><i class="bi bi-save"></i> Save</button>
            <button onclick="exportData()" class="btn-success" style="flex:1"><i class="bi bi-download"></i> Export</button>
            <button onclick="importData()" class="btn-success" style="flex:1"><i class="bi bi-upload"></i> Import</button>
            <button onclick="clearAll()" class="btn-danger" style="flex:1"><i class="bi bi-trash"></i> Clear All</button>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" id="search" placeholder="🔍 Search by name or client...">
        <select id="sortBy" style="width:auto;">
            <option value="date">Latest First</option><option value="name">Name A-Z</option><option value="client">Client A-Z</option>
        </select>
        <button onclick="printAll()" class="btn-success"><i class="bi bi-printer"></i> Print All</button>
    </div>

    <div id="recordsGrid" class="grid"></div>
</div>

<script>
    let records = [];
    
    function loadData() {
        const saved = localStorage.getItem('dtr_records');
        if(saved) records = JSON.parse(saved);
        else records = [];
        render();
        updateStats();
    }
    
    function saveToLocal() {
        localStorage.setItem('dtr_records', JSON.stringify(records));
        updateStats();
    }
    
    function saveRecord() {
        const name = document.getElementById('empName').value;
        const client = document.getElementById('client').value;
        const fromDate = document.getElementById('fromDate').value;
        const toDate = document.getElementById('toDate').value;
        const remarks = document.getElementById('remarks').value;
        
        if(!name || !client || !fromDate || !toDate) {
            showToast('Please fill all required fields', 'error');
            return;
        }
        
        if(!window.currentImage) {
            showToast('Please select an image', 'error');
            return;
        }
        
        const record = {
            id: Date.now(),
            name: name,
            client: client,
            fromDate: fromDate,
            toDate: toDate,
            cutoff: `${fromDate} to ${toDate}`,
            remarks: remarks,
            image: window.currentImage,
            date: new Date().toISOString()
        };
        
        records.unshift(record);
        saveToLocal();
        render();
        resetForm();
        showToast('Record saved!');
    }
    
    function deleteRecord(id) {
        if(confirm('Delete this record?')) {
            records = records.filter(r => r.id !== id);
            saveToLocal();
            render();
            showToast('Record deleted');
        }
    }
    
    function clearAll() {
        if(confirm('Delete ALL records? This cannot be undone!')) {
            records = [];
            saveToLocal();
            render();
            showToast('All records cleared');
        }
    }
    
    function render() {
        let filtered = [...records];
        const searchTerm = document.getElementById('search').value.toLowerCase();
        if(searchTerm) {
            filtered = filtered.filter(r => r.name.toLowerCase().includes(searchTerm) || r.client.toLowerCase().includes(searchTerm));
        }
        
        const sortBy = document.getElementById('sortBy').value;
        if(sortBy === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));
        else if(sortBy === 'client') filtered.sort((a,b) => a.client.localeCompare(b.client));
        else filtered.sort((a,b) => new Date(b.date) - new Date(a.date));
        
        const grid = document.getElementById('recordsGrid');
        if(filtered.length === 0) {
            grid.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">No records. Add your first DTR!</div>';
        } else {
            grid.innerHTML = filtered.map(r => `
                <div class="record-card">
                    <img src="${r.image}" class="record-img">
                    <div style="padding:10px">
                        <h5>${escapeHtml(r.name)}</h5>
                        <span style="color:#4361ee;font-size:12px;">🏢 ${escapeHtml(r.client)}</span><br>
                        <span style="color:#666;font-size:11px;">📅 ${r.cutoff}</span>
                        ${r.remarks ? `<p style="font-size:12px;color:#666;margin-top:5px;">💬 ${escapeHtml(r.remarks)}</p>` : ''}
                        <button onclick="deleteRecord(${r.id})" style="background:#dc3545;color:white;border:none;padding:5px 10px;border-radius:5px;margin-top:8px;width:100%;">Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        document.getElementById('totalCount').innerText = records.length;
        const employees = new Set(records.map(r => r.name));
        document.getElementById('empCount').innerText = employees.size;
        const now = new Date();
        const thisMonth = records.filter(r => new Date(r.date).getMonth() === now.getMonth());
        document.getElementById('monthCount').innerText = thisMonth.length;
        const clients = new Set(records.map(r => r.client));
        document.getElementById('clientCount').innerText = clients.size;
    }
    
    function updateStats() { render(); }
    
    function exportData() {
        const data = JSON.stringify(records, null, 2);
        const blob = new Blob([data], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `dtr_backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        showToast('Backup exported');
    }
    
    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/json';
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = event => {
                try {
                    const imported = JSON.parse(event.target.result);
                    if(confirm(`Import ${imported.length} records? This will replace current data.`)) {
                        records = imported;
                        saveToLocal();
                        render();
                        showToast('Data imported');
                    }
                } catch(err) {
                    showToast('Invalid file', 'error');
                }
            };
            reader.readAsText(file);
        };
        input.click();
    }
    
    function printAll() {
        const win = window.open('', '_blank');
        win.document.write(`
            <html><head><title>DTR Report</title>
            <style>body{font-family:Arial;padding:20px;} .record{margin-bottom:30px;border:1px solid #ddd;padding:15px;} img{max-width:100%;}</style>
            </head><body>
            <h1>DTR Report</h1>
            <p>Generated: ${new Date().toLocaleString()}</p>
            <p>Total: ${records.length} records</p>
            ${records.map(r => `<div class="record"><h3>${escapeHtml(r.name)}</h3><p>Client: ${escapeHtml(r.client)}</p><p>Cutoff: ${r.cutoff}</p>${r.remarks ? `<p>Remarks: ${escapeHtml(r.remarks)}</p>` : ''}<img src="${r.image}"></div>`).join('')}
            </body></html>
        `);
        win.document.close();
        win.print();
    }
    
    function resetForm() {
        document.getElementById('empName').value = '';
        document.getElementById('client').value = '';
        document.getElementById('remarks').value = '';
        document.getElementById('preview').style.display = 'none';
        window.currentImage = null;
        const today = new Date();
        const firstDay = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
        const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0).toISOString().split('T')[0];
        document.getElementById('fromDate').value = firstDay;
        document.getElementById('toDate').value = lastDay;
    }
    
    function showToast(msg, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(text) {
        if(!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    document.getElementById('imageFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('preview').src = e.target.result;
                document.getElementById('preview').style.display = 'block';
                window.currentImage = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    });
    
    document.getElementById('search').addEventListener('input', () => render());
    document.getElementById('sortBy').addEventListener('change', () => render());
    
    // Set default dates
    const today = new Date();
    const firstDay = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
    const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0).toISOString().split('T')[0];
    document.getElementById('fromDate').value = firstDay;
    document.getElementById('toDate').value = lastDay;
    
    loadData();
</script>
</body>
</html>
