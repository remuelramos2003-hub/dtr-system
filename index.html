<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTR System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:20px;font-family:Arial}
        .container{max-width:1200px;margin:0 auto;background:white;border-radius:20px;padding:20px}
        .card{background:#f8f9fa;padding:20px;border-radius:10px;margin-bottom:20px}
        input,select,textarea{width:100%;padding:8px;margin:5px 0 15px;border:1px solid #ddd;border-radius:5px}
        button{background:#667eea;color:white;padding:10px 20px;border:none;border-radius:5px;cursor:pointer}
        .record{border:1px solid #ddd;padding:10px;margin:10px 0;border-radius:5px}
        img{max-width:200px}
        .status{display:inline-block;padding:5px 10px;border-radius:20px;font-size:12px}
        .connected{background:#10b981;color:white}
        .disconnected{background:#ef4444;color:white}
    </style>
</head>
<body>
<div class="container">
    <h1>📅 DTR Management System</h1>
    <p id="status" class="status disconnected">Connecting...</p>
    
    <div class="card">
        <h3>Add DTR Record</h3>
        <input type="text" id="name" placeholder="Employee Name">
        <select id="dept">
            <option>IT</option><option>HR</option><option>Finance</option><option>Operations</option>
        </select>
        <input type="date" id="date">
        <textarea id="remarks" placeholder="Remarks"></textarea>
        <input type="file" id="image" accept="image/*">
        <img id="preview" style="max-width:200px;display:none">
        <button onclick="saveRecord()">Save to Cloud</button>
    </div>
    
    <h3>Records</h3>
    <div id="records"></div>
</div>

<script>
// ===== YOUR SUPABASE CONFIG - UPDATE THIS! =====
const SUPABASE_URL = "https://oioamrxxcgwejaaglvbg.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9pb2Ftcnh4Y2d3ZWphYWdsdmJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NjUxNzYsImV4cCI6MjA5NzA0MTE3Nn0.NrprjEB1cNHCqgYCerhcX3_79UvEBjhmu-ueGl1dlew"; // ← PASTE YOUR FULL KEY HERE!

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentImage = null;

// Test connection
async function testConnection() {
    try {
        const { data, error } = await supabase.from('dtr_records').select('count', { count: 'exact', head: true });
        if (error) throw error;
        document.getElementById('status').innerHTML = 'Connected ✓';
        document.getElementById('status').className = 'status connected';
        loadRecords();
    } catch(e) {
        document.getElementById('status').innerHTML = 'Connection Error - Check your anon key';
        document.getElementById('status').className = 'status disconnected';
        console.error(e);
    }
}

// Load records
async function loadRecords() {
    const { data, error } = await supabase.from('dtr_records').select('*').order('created_at', { ascending: false });
    if (error) { console.error(error); return; }
    
    const container = document.getElementById('records');
    if (data.length === 0) {
        container.innerHTML = '<p>No records yet. Upload your first DTR!</p>';
        return;
    }
    
    container.innerHTML = data.map(r => `
        <div class="record">
            <strong>${r.employee_name}</strong> - ${r.department}<br>
            Date: ${r.date}<br>
            ${r.remarks ? `Remarks: ${r.remarks}<br>` : ''}
            <img src="${r.image_data}"><br>
            <button onclick="deleteRecord(${r.id})">Delete</button>
        </div>
    `).join('');
}

// Save record
async function saveRecord() {
    const name = document.getElementById('name').value;
    const dept = document.getElementById('dept').value;
    const date = document.getElementById('date').value;
    const remarks = document.getElementById('remarks').value;
    
    if (!name || !dept || !date || !currentImage) {
        alert('Please fill all fields and select an image');
        return;
    }
    
    const { error } = await supabase.from('dtr_records').insert([{
        employee_name: name,
        department: dept,
        date: date,
        remarks: remarks,
        image_data: currentImage
    }]);
    
    if (error) { alert('Error: ' + error.message); return; }
    
    alert('Saved!');
    document.getElementById('name').value = '';
    document.getElementById('remarks').value = '';
    document.getElementById('preview').style.display = 'none';
    currentImage = null;
    loadRecords();
}

// Delete record
async function deleteRecord(id) {
    if (!confirm('Delete this record?')) return;
    const { error } = await supabase.from('dtr_records').delete().eq('id', id);
    if (error) { alert('Error: ' + error.message); return; }
    loadRecords();
}

// Image preview
document.getElementById('image').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('preview').src = event.target.result;
            document.getElementById('preview').style.display = 'block';
            currentImage = event.target.result;
        };
        reader.readAsDataURL(file);
    }
});

// Set default date
document.getElementById('date').value = new Date().toISOString().split('T')[0];

// Start
testConnection();
</script>
</body>
</html>
