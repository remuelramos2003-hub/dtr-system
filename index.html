<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DTR System | Real-Time Auto Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#eef2ff;padding:16px;font-family:'Segoe UI',sans-serif;}
        .container{max-width:1400px;margin:0 auto;background:white;border-radius:24px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,0.08);}
        h1{text-align:center;color:#1e293b;margin-bottom:8px;font-size:1.8rem;}
        .subtitle{text-align:center;color:#64748b;margin-bottom:20px;font-size:0.9rem;}
        .status{text-align:center;padding:10px;border-radius:12px;margin-bottom:24px;font-weight:500;}
        .status.online{background:#d1fae5;color:#065f46;}
        .status.offline{background:#fee2e2;color:#991b1b;}
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:25px;}
        .stat-card{background:#f8fafc;padding:16px;border-radius:16px;text-align:center;border:1px solid #e2e8f0;}
        .stat-card i{font-size:28px;color:#3b82f6;}
        .stat-card h3{font-size:32px;font-weight:700;margin:8px 0;color:#1e293b;}
        .stat-card p{color:#64748b;margin:0;font-size:0.85rem;}
        .form-card{background:#f8fafc;padding:24px;border-radius:20px;margin-bottom:25px;border:1px solid #e2e8f0;}
        .form-card h4{margin-bottom:20px;color:#1e293b;font-weight:600;}
        input,select,textarea{width:100%;padding:12px;margin:8px 0 16px;border:1px solid #cbd5e1;border-radius:12px;font-size:14px;}
        input:focus,select:focus,textarea:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.1);}
        button{background:#3b82f6;color:white;padding:12px 20px;border:none;border-radius:12px;cursor:pointer;font-weight:600;width:100%;transition:all 0.2s;}
        button:hover{background:#2563eb;transform:translateY(-1px);}
        .btn-danger{background:#ef4444;}
        .btn-danger:hover{background:#dc2626;}
        .btn-success{background:#10b981;width:auto;padding:8px 16px;}
        .btn-warning{background:#f59e0b;width:auto;padding:8px 16px;}
        .search-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
        .search-bar input{flex:1;margin:0;}
        .search-bar select{width:auto;margin:0;padding:10px;}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:20px;max-height:600px;overflow-y:auto;padding:4px;}
        .record-card{background:white;border-radius:16px;overflow:hidden;border:1px solid #e2e8f0;transition:all 0.2s;}
        .record-card:hover{transform:translateY(-3px);box-shadow:0 10px 25px -5px rgba(0,0,0,0.1);}
        .record-img{width:100%;height:200px;object-fit:cover;background:#f1f5f9;cursor:pointer;}
        .record-body{padding:16px;}
        .record-name{font-weight:700;font-size:16px;color:#1e293b;}
        .record-client{color:#3b82f6;font-size:13px;margin:5px 0;}
        .record-date{color:#64748b;font-size:12px;}
        .record-remarks{color:#64748b;font-size:12px;margin-top:8px;padding-top:8px;border-top:1px solid #e2e8f0;}
        .btn-group{display:flex;gap:8px;margin-top:12px;}
        .btn-group button{flex:1;padding:8px;font-size:12px;}
        .preview-img{max-width:100%;max-height:150px;border-radius:12px;margin-top:10px;display:none;object-fit:cover;}
        .date-group{display:flex;gap:10px;align-items:center;}
        .date-group input{flex:1;margin-bottom:0;}
        .live-badge{background:#10b981;color:white;padding:4px 12px;border-radius:50px;font-size:11px;display:inline-block;margin-left:10px;}
        .sync-indicator{position:fixed;bottom:20px;right:20px;background:#1e293b;color:white;padding:8px 16px;border-radius:50px;font-size:12px;z-index:1000;}
        @media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr);}.date-group{flex-direction:column;}}
        @media print{.form-card,.search-bar,.stats,.btn-group,.sync-indicator{display:none;}}
        .empty-state{text-align:center;padding:60px;color:#94a3b8;}
    </style>
</head>
<body>
<div class="container">
    <h1><i class="bi bi-cloud-database"></i> DTR System <span class="live-badge"><i class="bi bi-broadcast"></i> LIVE SYNC</span></h1>
    <div class="subtitle">Real-time updates | All devices sync automatically | No refresh needed</div>
    
    <div id="status" class="status online"><i class="bi bi-check-circle"></i> Connected - Live Updates Active</div>

    <div class="stats">
        <div class="stat-card"><i class="bi bi-files"></i><h3 id="totalCount">0</h3><p>Total Records</p></div>
        <div class="stat-card"><i class="bi bi-people"></i><h3 id="empCount">0</h3><p>Employees</p></div>
        <div class="stat-card"><i class="bi bi-calendar-month"></i><h3 id="monthCount">0</h3><p>This Month</p></div>
        <div class="stat-card"><i class="bi bi-building"></i><h3 id="clientCount">0</h3><p>Clients</p></div>
    </div>

    <div class="form-card">
        <h4><i class="bi bi-plus-circle"></i> Add DTR Record</h4>
        <input type="text" id="empName" placeholder="Employee Name *">
        <select id="client">
            <option value="">Select Client</option>
            <option>AHAM</option><option>ARGO</option><option>BEYOND CONCEPT</option><option>COH</option>
            <option>DC SUPERHEROES</option><option>DIAMOND</option><option>DIGITS</option><option>EASTERWIRE</option>
            <option>EL FASHION</option><option>ESP</option><option>FBC</option><option>FIL EM</option>
            <option>FILOGISTICS</option><option>FILPAC</option><option>FILSTAR</option><option>SHOPEE</option>
            <option>LANDERS</option><option>HAVI</option><option>OTHER</option>
        </select>
        <div class="date-group">
            <input type="date" id="fromDate">
            <span>→</span>
            <input type="date" id="toDate">
        </div>
        <textarea id="remarks" rows="2" placeholder="Remarks (optional)"></textarea>
        <input type="file" id="imageFile" accept="image/*">
        <img id="preview" class="preview-img">
        <button id="saveBtn"><i class="bi bi-save"></i> Save to Database</button>
        <button id="cancelEditBtn" style="display:none; margin-top:10px; background:#64748b;" onclick="cancelEdit()"><i class="bi bi-x-circle"></i> Cancel Edit</button>
    </div>

    <div class="search-bar">
        <input type="text" id="search" placeholder="🔍 Search by name or client...">
        <select id="sortBy">
            <option value="date">Latest First</option>
            <option value="name">Name A-Z</option>
        </select>
        <button id="printBtn" class="btn-success"><i class="bi bi-printer"></i> Print</button>
    </div>

    <div id="recordsGrid"><div class="empty-state"><i class="bi bi-database"></i><p>Loading records...</p></div></div>
</div>
<div class="sync-indicator"><i class="bi bi-broadcast"></i> Real-time sync active</div>

<script>
    // Supabase config
    const SUPABASE_URL = "https://oioamrxxcgwejaaglvbg.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9pb2Ftcnh4Y2d3ZWphYWdsdmJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NjUxNzYsImV4cCI6MjA5NzA0MTE3Nn0.NrprjEB1cNHCqgYCerhcX3_79UvEBjhmu-ueGl1dlew";
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let allRecords = [];
    let currentImage = null;
    let editingId = null;

    // ============ REAL-TIME SUBSCRIPTION (AUTO REFRESH) ============
    function subscribeToChanges() {
        const subscription = supabase
            .channel('dtr_records_changes')
            .on('postgres_changes', 
                { event: '*', schema: 'public', table: 'dtr_records' },
                (payload) => {
                    console.log('Change detected:', payload.eventType);
                    // Auto-refresh when ANY change happens
                    loadRecords();
                }
            )
            .subscribe();
        
        return subscription;
    }

    // ============ LOAD RECORDS ============
    async function loadRecords() {
        try {
            const { data, error } = await supabase
                .from('dtr_records')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) throw error;
            
            allRecords = data || [];
            renderRecords();
            updateStats();
            
            document.getElementById('status').innerHTML = '<i class="bi bi-check-circle"></i> Connected - Live Updates Active';
            document.getElementById('status').className = 'status online';
            
        } catch (error) {
            console.error('Load error:', error);
            document.getElementById('status').innerHTML = '<i class="bi bi-exclamation-triangle"></i> Error: ' + error.message;
            document.getElementById('status').className = 'status offline';
        }
    }

    // ============ SAVE RECORD ============
    async function saveRecord() {
        const name = document.getElementById('empName').value;
        const client = document.getElementById('client').value;
        const fromDate = document.getElementById('fromDate').value;
        const toDate = document.getElementById('toDate').value;
        const remarks = document.getElementById('remarks').value;
        
        if (!name) { alert('Please enter employee name'); return; }
        if (!client) { alert('Please select a client'); return; }
        if (!fromDate || !toDate) { alert('Please select cutoff dates'); return; }
        if (!currentImage && !editingId) { alert('Please select an image'); return; }
        
        const cutoffRange = `${fromDate} to ${toDate}`;
        
        const recordData = {
            employee_name: name,
            department: client,
            cutoff_from: fromDate,
            cutoff_to: toDate,
            cutoff_range: cutoffRange,
            remarks: remarks || '',
            image_data: currentImage
        };
        
        try {
            if (editingId) {
                const { error } = await supabase
                    .from('dtr_records')
                    .update(recordData)
                    .eq('id', editingId);
                
                if (error) throw error;
                alert('Record updated!');
            } else {
                const { error } = await supabase
                    .from('dtr_records')
                    .insert([recordData]);
                
                if (error) throw error;
                alert('Record saved!');
            }
            
            resetForm();
            // No need to call loadRecords() - real-time subscription will auto-update!
            
        } catch (error) {
            alert('Error: ' + error.message);
        }
    }

    // ============ DELETE RECORD ============
    async function deleteRecord(id) {
        if (!confirm('Delete permanently?')) return;
        
        try {
            const { error } = await supabase
                .from('dtr_records')
                .delete()
                .eq('id', id);
            
            if (error) throw error;
            alert('Deleted!');
            // Auto-refresh happens via subscription
            
        } catch (error) {
            alert('Error: ' + error.message);
        }
    }

    // ============ EDIT RECORD ============
    function editRecord(record) {
        editingId = record.id;
        document.getElementById('empName').value = record.employee_name;
        document.getElementById('client').value = record.department;
        document.getElementById('fromDate').value = record.cutoff_from || '';
        document.getElementById('toDate').value = record.cutoff_to || '';
        document.getElementById('remarks').value = record.remarks || '';
        
        if (record.image_data) {
            document.getElementById('preview').src = record.image_data;
            document.getElementById('preview').style.display = 'block';
            currentImage = record.image_data;
        }
        
        document.getElementById('saveBtn').innerHTML = '<i class="bi bi-pencil"></i> Update Record';
        document.getElementById('saveBtn').style.background = '#f59e0b';
        document.getElementById('cancelEditBtn').style.display = 'block';
        
        document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth' });
    }

    function cancelEdit() {
        resetForm();
        alert('Edit cancelled');
    }

    function resetForm() {
        editingId = null;
        document.getElementById('empName').value = '';
        document.getElementById('client').value = '';
        document.getElementById('remarks').value = '';
        document.getElementById('preview').style.display = 'none';
        document.getElementById('preview').src = '';
        document.getElementById('imageFile').value = '';
        currentImage = null;
        document.getElementById('saveBtn').innerHTML = '<i class="bi bi-save"></i> Save to Database';
        document.getElementById('saveBtn').style.background = '#3b82f6';
        document.getElementById('cancelEditBtn').style.display = 'none';
        
        // Set default dates
        const today = new Date();
        const firstDay = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
        const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0).toISOString().split('T')[0];
        document.getElementById('fromDate').value = firstDay;
        document.getElementById('toDate').value = lastDay;
    }

    // ============ RENDER RECORDS ============
    function renderRecords() {
        const searchTerm = document.getElementById('search').value.toLowerCase();
        let filtered = allRecords.filter(r => 
            (r.employee_name || '').toLowerCase().includes(searchTerm) ||
            (r.department || '').toLowerCase().includes(searchTerm)
        );
        
        const sortBy = document.getElementById('sortBy').value;
        if (sortBy === 'name') {
            filtered.sort((a, b) => (a.employee_name || '').localeCompare(b.employee_name || ''));
        } else {
            filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        }
        
        const grid = document.getElementById('recordsGrid');
        
        if (filtered.length === 0) {
            grid.innerHTML = `<div class="empty-state"><i class="bi bi-inbox"></i><h4>No Records</h4><p>Add your first DTR record above.</p></div>`;
            return;
        }
        
        grid.innerHTML = filtered.map(record => `
            <div class="record-card">
                <img src="${record.image_data}" class="record-img" alt="DTR" onclick="window.open(this.src)">
                <div class="record-body">
                    <div class="record-name">👤 ${escapeHtml(record.employee_name)}</div>
                    <div class="record-client">🏢 ${escapeHtml(record.department)}</div>
                    <div class="record-date">📅 Cutoff: ${record.cutoff_range || record.cutoff_from + ' → ' + record.cutoff_to}</div>
                    ${record.remarks ? `<div class="record-remarks">💬 ${escapeHtml(record.remarks)}</div>` : ''}
                    <div class="btn-group">
                        <button onclick='editRecord(${JSON.stringify(record).replace(/'/g, "&#39;")})' style="background:#f59e0b;">Edit</button>
                        <button onclick="deleteRecord(${record.id})" style="background:#ef4444;">Delete</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // ============ UPDATE STATS ============
    function updateStats() {
        document.getElementById('totalCount').textContent = allRecords.length;
        
        const uniqueEmployees = new Set(allRecords.map(r => r.employee_name));
        document.getElementById('empCount').textContent = uniqueEmployees.size;
        
        const now = new Date();
        const currentYearMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        const thisMonthCount = allRecords.filter(r => {
            if (!r.created_at) return false;
            return r.created_at.startsWith(currentYearMonth);
        }).length;
        document.getElementById('monthCount').textContent = thisMonthCount;
        
        const uniqueClients = new Set(allRecords.map(r => r.department));
        document.getElementById('clientCount').textContent = uniqueClients.size;
    }

    // ============ PRINT ============
    function printAll() {
        if (allRecords.length === 0) { alert('No records to print'); return; }
        
        const win = window.open('', '_blank');
        win.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <title>DTR Report</title>
                <style>
                    body{font-family:Arial;padding:30px;}
                    h1{text-align:center;}
                    .record{margin-bottom:30px;border:1px solid #ddd;padding:20px;page-break-inside:avoid;}
                    img{max-width:100%;}
                </style>
            </head>
            <body>
                <h1>DTR Report</h1>
                <p style="text-align:center">Generated: ${new Date().toLocaleString()}</p>
                <p style="text-align:center">Total: ${allRecords.length} records</p>
                ${allRecords.map(r => `
                    <div class="record">
                        <h3>${escapeHtml(r.employee_name)}</h3>
                        <p><strong>Client:</strong> ${escapeHtml(r.department)}</p>
                        <p><strong>Cutoff:</strong> ${r.cutoff_range || r.cutoff_from + ' to ' + r.cutoff_to}</p>
                        ${r.remarks ? `<p><strong>Remarks:</strong> ${escapeHtml(r.remarks)}</p>` : ''}
                        <img src="${r.image_data}">
                    </div>
                `).join('')}
            </body>
            </html>
        `);
        win.document.close();
        win.print();
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ============ IMAGE PREVIEW ============
    document.getElementById('imageFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('preview').src = event.target.result;
                document.getElementById('preview').style.display = 'block';
                currentImage = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    // ============ EVENT LISTENERS ============
    document.getElementById('saveBtn').addEventListener('click', saveRecord);
    document.getElementById('printBtn').addEventListener('click', printAll);
    document.getElementById('search').addEventListener('input', renderRecords);
    document.getElementById('sortBy').addEventListener('change', renderRecords);

    // Set default dates
    const today = new Date();
    const firstDay = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
    const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0).toISOString().split('T')[0];
    document.getElementById('fromDate').value = firstDay;
    document.getElementById('toDate').value = lastDay;

    // Start with real-time subscription
    loadRecords();
    subscribeToChanges();
</script>
</body>
</html>
