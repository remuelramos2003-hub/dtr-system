<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTR System - Working Version</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f0f2f5;font-family:Arial,sans-serif;padding:20px;}
        .container{max-width:1200px;margin:0 auto;background:white;border-radius:20px;padding:20px;}
        h1{text-align:center;margin-bottom:20px;color:#1a1a2e;}
        .status{text-align:center;padding:10px;margin-bottom:20px;border-radius:10px;}
        .status.connected{background:#d4edda;color:#155724;}
        .status.error{background:#f8d7da;color:#721c24;}
        .form-area{background:#f8f9fa;padding:20px;border-radius:10px;margin-bottom:20px;}
        input,select,textarea{width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:8px;}
        button{background:#4361ee;color:white;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;width:100%;}
        button:hover{opacity:0.9;}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:15px;margin-top:20px;}
        .card{background:white;border:1px solid #ddd;border-radius:10px;overflow:hidden;}
        .card img{width:100%;height:180px;object-fit:cover;}
        .card-body{padding:15px;}
        .name{font-weight:bold;font-size:1.1em;}
        .client{color:#4361ee;margin:5px 0;}
        .date{color:#666;font-size:0.85em;}
        .delete-btn{background:#dc3545;color:white;border:none;padding:8px;border-radius:5px;margin-top:10px;width:100%;cursor:pointer;}
        .search-bar{display:flex;gap:10px;margin-bottom:20px;}
        .search-bar input{flex:1;margin:0;}
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:20px;}
        .stat-card{background:#f8f9fa;padding:15px;text-align:center;border-radius:10px;}
        .stat-card h3{font-size:24px;color:#4361ee;}
        .hidden{display:none;}
        .preview{max-width:100%;max-height:150px;margin-top:10px;border-radius:8px;display:none;}
    </style>
</head>
<body>
<div class="container">
    <h1>📅 DTR Management System</h1>
    <div id="status" class="status">🔌 Connecting to database...</div>

    <div class="stats">
        <div class="stat-card"><h3 id="totalCount">0</h3><p>Records</p></div>
        <div class="stat-card"><h3 id="empCount">0</h3><p>Employees</p></div>
        <div class="stat-card"><h3 id="monthCount">0</h3><p>This Month</p></div>
        <div class="stat-card"><h3 id="clientCount">0</h3><p>Clients</p></div>
    </div>

    <div class="form-area">
        <h3>Add New DTR</h3>
        <input type="text" id="empName" placeholder="Employee Name">
        <select id="client">
            <option>AHAM</option><option>ARGO</option><option>BEYOND CONCEPT</option><option>COH</option>
            <option>DC SUPERHEROES</option><option>DIAMOND</option><option>SHOPEE</option><option>LANDERS</option>
        </select>
        <div style="display:flex;gap:10px;">
            <input type="date" id="fromDate" style="flex:1">
            <span style="line-height:40px">→</span>
            <input type="date" id="toDate" style="flex:1">
        </div>
        <textarea id="remarks" rows="2" placeholder="Remarks (optional)"></textarea>
        <input type="file" id="imageFile" accept="image/*">
        <img id="preview" class="preview">
        <button id="saveBtn">💾 Save to Database</button>
    </div>

    <div class="search-bar">
        <input type="text" id="search" placeholder="🔍 Search by name or client...">
        <select id="sortBy" style="width:100px;">
            <option value="date">Latest</option><option value="name">Name</option>
        </select>
        <button id="printBtn" style="width:80px;background:#2e7d32;">🖨️ Print</button>
    </div>

    <div id="recordsGrid"></div>
</div>

<script>
    // Supabase configuration
    const SUPABASE_URL = "https://oioamrxxcgwejaaglvbg.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9pb2Ftcnh4Y2d3ZWphYWdsdmJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NjUxNzYsImV4cCI6MjA5NzA0MTE3Nn0.NrprjEB1cNHCqgYCerhcX3_79UvEBjhmu-ueGl1dlew";
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let allRecords = [];
    let currentImage = null;

    // Test connection function
    async function testConnection() {
        try {
            const { data, error } = await supabase.from('dtr_records').select('count');
            if (error) throw error;
            return true;
        } catch(e) {
            console.log('Connection test failed:', e);
            return false;
        }
    }

    // Load all records
    async function loadRecords() {
        try {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '🔄 Syncing...';
            statusDiv.className = 'status';
            
            const { data, error } = await supabase
                .from('dtr_records')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) {
                throw error;
            }
            
            allRecords = data || [];
            renderGrid();
            updateStats();
            
            statusDiv.innerHTML = '✅ Connected - Live Sync Active';
            statusDiv.className = 'status connected';
            
        } catch (error) {
            console.error('Load error:', error);
            document.getElementById('status').innerHTML = '❌ Connection Failed! Please run the SQL command in Supabase.';
            document.getElementById('status').className = 'status error';
            document.getElementById('recordsGrid').innerHTML = `
                <div style="text-align:center;padding:40px;background:#f8f9fa;border-radius:10px;">
                    <h3>⚠️ Connection Issue</h3>
                    <p>Please run this SQL in your Supabase SQL Editor:</p>
                    <code style="display:block;background:#fff;padding:10px;margin:10px 0;border:1px solid #ddd;">
                        ALTER TABLE dtr_records DISABLE ROW LEVEL SECURITY;
                    </code>
                    <button onclick="window.open('https://supabase.com/dashboard/project/oioamrxxcgwejaaglvbg/sql/new','_blank')" style="width:auto;margin-top:10px;">
                        Open SQL Editor
                    </button>
                </div>
            `;
        }
    }

    // Save record
    async function saveRecord() {
        const name = document.getElementById('empName').value;
        const client = document.getElementById('client').value;
        const fromDate = document.getElementById('fromDate').value;
        const toDate = document.getElementById('toDate').value;
        const remarks = document.getElementById('remarks').value;
        
        if (!name || !client || !fromDate || !toDate) {
            alert('Please fill all required fields');
            return;
        }
        
        if (!currentImage) {
            alert('Please select an image');
            return;
        }
        
        const cutoffRange = `${fromDate} to ${toDate}`;
        
        const { data, error } = await supabase
            .from('dtr_records')
            .insert([{
                employee_name: name,
                department: client,
                cutoff_from: fromDate,
                cutoff_to: toDate,
                cutoff_range: cutoffRange,
                remarks: remarks || '',
                image_data: currentImage
            }]);
        
        if (error) {
            alert('Error: ' + error.message);
            return;
        }
        
        alert('Record saved to cloud!');
        
        // Reset form
        document.getElementById('empName').value = '';
        document.getElementById('remarks').value = '';
        document.getElementById('preview').style.display = 'none';
        document.getElementById('preview').src = '';
        document.getElementById('imageFile').value = '';
        currentImage = null;
        
        loadRecords();
    }

    // Delete record
    async function deleteRecord(id) {
        if (!confirm('Delete this record permanently?')) return;
        
        const { error } = await supabase
            .from('dtr_records')
            .delete()
            .eq('id', id);
        
        if (error) {
            alert('Error: ' + error.message);
            return;
        }
        
        alert('Record deleted');
        loadRecords();
    }

    // Render grid
    function renderGrid() {
        const searchTerm = document.getElementById('search').value.toLowerCase();
        let filtered = allRecords.filter(r => 
            (r.employee_name || '').toLowerCase().includes(searchTerm) ||
            (r.department || '').toLowerCase().includes(searchTerm)
        );
        
        const sortBy = document.getElementById('sortBy').value;
        if (sortBy === 'name') {
            filtered.sort((a,b) => (a.employee_name || '').localeCompare(b.employee_name || ''));
        } else {
            filtered.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
        }
        
        const grid = document.getElementById('recordsGrid');
        
        if (filtered.length === 0) {
            grid.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">No records found. Add your first DTR!</div>';
            return;
        }
        
        grid.innerHTML = filtered.map(record => `
            <div class="card">
                <img src="${record.image_data}" alt="DTR" onclick="window.open(this.src)">
                <div class="card-body">
                    <div class="name">${escapeHtml(record.employee_name)}</div>
                    <div class="client">${escapeHtml(record.department)}</div>
                    <div class="date">Cutoff: ${record.cutoff_range || record.cutoff_from + ' → ' + record.cutoff_to}</div>
                    ${record.remarks ? `<div class="date" style="margin-top:5px;">📝 ${escapeHtml(record.remarks)}</div>` : ''}
                    <button class="delete-btn" onclick="deleteRecord(${record.id})">Delete</button>
                </div>
            </div>
        `).join('');
    }

    // Update stats
    function updateStats() {
        document.getElementById('totalCount').textContent = allRecords.length;
        const uniqueEmps = new Set(allRecords.map(r => r.employee_name));
        document.getElementById('empCount').textContent = uniqueEmps.size;
        const now = new Date();
        const thisMonth = allRecords.filter(r => r.created_at && new Date(r.created_at).getMonth() === now.getMonth());
        document.getElementById('monthCount').textContent = thisMonth.length;
        const uniqueClients = new Set(allRecords.map(r => r.department));
        document.getElementById('clientCount').textContent = uniqueClients.size;
    }

    // Print all
    function printAll() {
        if (allRecords.length === 0) {
            alert('No records to print');
            return;
        }
        
        const win = window.open('', '_blank');
        win.document.write(`
            <html>
            <head>
                <title>DTR Report</title>
                <style>
                    body{font-family:Arial;padding:20px;}
                    h1{text-align:center;}
                    .record{margin-bottom:30px;border:1px solid #ddd;padding:15px;page-break-inside:avoid;}
                    img{max-width:100%;}
                </style>
            </head>
            <body>
                <h1>DTR Report</h1>
                <p style="text-align:center">Generated: ${new Date().toLocaleString()}</p>
                <p style="text-align:center">Total Records: ${allRecords.length}</p>
                ${allRecords.map(r => `
                    <div class="record">
                        <h3>${escapeHtml(r.employee_name)}</h3>
                        <p><strong>Client:</strong> ${escapeHtml(r.department)}</p>
                        <p><strong>Cutoff:</strong> ${r.cutoff_range || r.cutoff_from + ' to ' + r.cutoff_to}</p>
                        ${r.remarks ? `<p><strong>Remarks:</strong> ${escapeHtml(r.remarks)}</p>` : ''}
                        <img src="${r.image_data}">
                    </div>
                `).join('')}
            </body>
            </html>
        `);
        win.document.close();
        win.print();
    }

    // Helper functions
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Image preview
    document.getElementById('imageFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const preview = document.getElementById('preview');
                preview.src = event.target.result;
                preview.style.display = 'block';
                currentImage = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    // Event listeners
    document.getElementById('saveBtn').addEventListener('click', saveRecord);
    document.getElementById('printBtn').addEventListener('click', printAll);
    document.getElementById('search').addEventListener('input', renderGrid);
    document.getElementById('sortBy').addEventListener('change', renderGrid);

    // Set default dates
    const today = new Date();
    const firstDay = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
    const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0).toISOString().split('T')[0];
    document.getElementById('fromDate').value = firstDay;
    document.getElementById('toDate').value = lastDay;

    // Start
    loadRecords();
</script>
</body>
</html>
