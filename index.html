    function log(message, type = 'info') {
        const logDiv = document.getElementById('logOutput');
        const colors = {
            success: '#10b981',
            error: '#ef4444',
            info: '#3b82f6',
            warning: '#f59e0b'
        };

        logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function getGoogleDriveAccessToken() {
        log('🔑 Creating JWT token...', 'info');
        
        const payload = {
            iss: GOOGLE_DRIVE_CONFIG.CLIENT_EMAIL,
            scope: 'https://www.googleapis.com/auth/drive.file',
            aud: 'https://oauth2.googleapis.com/token',
            exp: Math.floor(Date.now() / 1000) + 3600,
            iat: Math.floor(Date.now() / 1000)
        };

        const header = { alg: 'RS256', typ: 'JWT' };
        
        const encodedHeader = btoa(JSON.stringify(header));
        const encodedPayload = btoa(JSON.stringify(payload));
        
        const signatureInput = encodedHeader + '.' + encodedPayload;
        
        const privateKey = GOOGLE_DRIVE_CONFIG.PRIVATE_KEY;
        const pemHeader = "-----BEGIN PRIVATE KEY-----";
        const pemFooter = "-----END PRIVATE KEY-----";
        const pemContents = privateKey.substring(pemHeader.length, privateKey.length - pemFooter.length);
        const binaryDerString = atob(pemContents);
        
        const binaryDer = new Uint8Array(binaryDerString.length);
        for (let i = 0; i < binaryDerString.length; i++) {
            binaryDer[i] = binaryDerString.charCodeAt(i);
        }
        
        const cryptoKey = await crypto.subtle.importKey(
            'pkcs8',
            binaryDer,
            { name: 'RSASSA-PKCS1-v1_5', hash: 'SHA-256' },
            false,
            ['sign']
        );
        
        const signature = await crypto.subtle.sign(
            'RSASSA-PKCS1-v1_5',
            cryptoKey,
            new TextEncoder().encode(signatureInput)
        );
        
        const signatureBase64 = btoa(String.fromCharCode(...new Uint8Array(signature)));
        
        const jwt = signatureInput + '.' + signatureBase64;
        
        log('📤 Sending token request to Google...', 'info');
        
        const response = await fetch('https://oauth2.googleapis.com/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                grant_type: 'urn:ietf:params:oauth:grant-type:jwt-bearer',
                assertion: jwt
            })
        });
        
        const responseText = await response.text();
        log(`📥 Response status: ${response.status}`, response.ok ? 'success' : 'error');
        
        if (!response.ok) {
            log(`❌ Error response: ${responseText}`, 'error');
            throw new Error(`Token request failed: ${responseText}`);
        }
        
        const data = JSON.parse(responseText);
        log('✅ Token obtained successfully!', 'success');
        return data.access_token;
    }

    async function testDriveConnection() {
        const badge = document.getElementById('statusBadge');
        const logDiv = document.getElementById('logOutput');
        
        // Clear log
        logDiv.innerHTML = '';
        log('🚀 Starting Drive connection test...', 'info');
        
        badge.className = 'status checking';
        badge.textContent = '⏳ Checking...';
        
        try {
            // Step 1: Test token generation
            log('📋 Step 1: Getting access token...', 'info');
            const token = await getGoogleDriveAccessToken();
            log(`✅ Access token received (length: ${token.length})`, 'success');
            
            // Step 2: Test folder access
            log('📋 Step 2: Testing folder access...', 'info');
            const folderId = GOOGLE_DRIVE_CONFIG.FOLDER_ID;
            
            const driveResponse = await fetch(`https://www.googleapis.com/drive/v3/files/${folderId}?fields=id,name`, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });
            
            const driveResult = await driveResponse.json();
            
            if (driveResponse.ok) {
                log(`✅ Folder found: "${driveResult.name}" (ID: ${driveResult.id})`, 'success');
                badge.className = 'status connected';
                badge.textContent = '✅ Drive Connected';
            } else {
                log(`❌ Drive API error: ${JSON.stringify(driveResult)}`, 'error');
                badge.className = 'status disconnected';
                badge.textContent = '❌ Access Denied';
                
                if (driveResult.error?.message?.includes('not found')) {
                    log('⚠️ Folder not found. Make sure the FOLDER_ID is correct.', 'warning');
                    log('💡 Your Folder ID: 1ubwtrTYnmxac31Il0GArmMsJkWn1CEvI', 'info');
                }
                if (driveResult.error?.message?.includes('permission')) {
                    log('⚠️ Permission denied. Share the folder with:', 'warning');
                    log(`   ${GOOGLE_DRIVE_CONFIG.CLIENT_EMAIL}`, 'info');
                }
            }
            
        } catch (error) {
            log(`❌ Error: ${error.message}`, 'error');
            badge.className = 'status disconnected';
            badge.textContent = '❌ Connection Failed';
            
            if (error.message.includes('CORS')) {
                log('⚠️ CORS error detected. Make sure you are running this from a web server.', 'warning');
                log('💡 Try using Live Server in VS Code or upload to a web host.', 'info');
            }
        }
    }
